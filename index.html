<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>매머드 레이싱</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f0f4f8;
      color: #1e293b;
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ===== 설정 화면 ===== */
    .setup-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 20px 16px;
      background: linear-gradient(180deg, #87CEEB 0%, #B0E0FF 40%, #e8f4e8 70%, #d4e8d0 100%);
    }
    .setup-screen.hidden { display: none; }
    .setup-card {
      width: 100%;
      max-width: 400px;
      background: rgba(255,255,255,0.92);
      border-radius: 20px;
      padding: 28px 22px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.1);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .setup-title {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 800;
      color: #1e293b;
      letter-spacing: 0.05em;
    }
    .setup-subtitle {
      text-align: center;
      font-size: 0.78rem;
      color: #64748b;
      margin-top: -10px;
    }
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .field-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #475569;
    }
    .field-hint {
      font-size: 0.68rem;
      color: #94a3b8;
    }
    .setup-card select {
      width: 100%;
      border-radius: 12px;
      border: 1.5px solid #cbd5e1;
      background: #f8fafc;
      color: #1e293b;
      font-size: 0.85rem;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
      -webkit-appearance: none;
    }
    .setup-card select:focus { border-color: #f97316; }

    /* 매머드 행 목록 */
    .mammoth-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .mammoth-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f1f5f9;
      border-radius: 12px;
      padding: 8px 10px;
      border: 1.5px solid #e2e8f0;
      transition: border-color 0.2s;
    }
    .mammoth-row:focus-within { border-color: #f97316; }
    .mammoth-row-num {
      font-size: 0.72rem;
      font-weight: 700;
      color: #94a3b8;
      min-width: 18px;
      text-align: center;
    }
    .mammoth-row input[type="color"] {
      width: 28px;
      height: 28px;
      border: 2px solid #e2e8f0;
      border-radius: 50%;
      padding: 0;
      cursor: pointer;
      background: none;
      flex-shrink: 0;
      appearance: none;
      -webkit-appearance: none;
    }
    .mammoth-row input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    .mammoth-row input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }
    .mammoth-row input[type="color"]::-moz-color-swatch { border: none; border-radius: 50%; }
    .mammoth-row input[type="text"] {
      flex: 1;
      min-width: 0;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #1e293b;
      font-size: 0.85rem;
      padding: 6px 10px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .mammoth-row input[type="text"]:focus { border-color: #f97316; }
    .mammoth-row input[type="text"]::placeholder { color: #94a3b8; }
    .btn-remove-mammoth {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: none;
      background: #fee2e2;
      color: #ef4444;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
      padding: 0;
      line-height: 1;
    }
    .btn-remove-mammoth:active { background: #fca5a5; }
    .btn-add-mammoth {
      width: 100%;
      padding: 10px;
      border-radius: 12px;
      border: 2px dashed #cbd5e1;
      background: transparent;
      color: #64748b;
      font-weight: 600;
      font-size: 0.82rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-add-mammoth:hover { border-color: #f97316; color: #f97316; }
    .btn-add-mammoth:active { transform: scale(0.98); }
    .btn-add-mammoth[disabled] { opacity: 0.35; cursor: default; border-color: #e2e8f0; color: #94a3b8; }

    .mammoth-count {
      text-align: center;
      font-size: 0.72rem;
      color: #94a3b8;
    }

    .btn-start {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #f97316, #fb923c);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(249,115,22,0.35);
      transition: transform 0.1s, box-shadow 0.1s;
      letter-spacing: 0.05em;
    }
    .btn-start:active { transform: scale(0.98); box-shadow: 0 3px 10px rgba(249,115,22,0.25); }

    /* ===== 레이스 화면 ===== */
    .race-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      min-height: 100dvh;
    }
    .race-screen.active { display: flex; }
    .race-topbar {
      width: 100%;
      max-width: 480px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 6px 10px;
      flex-wrap: wrap;
    }
    .race-topbar button {
      border-radius: 10px;
      border: none;
      font-weight: 600;
      font-size: 0.75rem;
      padding: 7px 14px;
      cursor: pointer;
      transition: transform 0.1s;
      white-space: nowrap;
    }
    .race-topbar button:active { transform: scale(0.97); }
    .btn-pause {
      background: rgba(30,41,59,0.85);
      color: #e2e8f0;
    }
    .btn-reset {
      background: rgba(30,41,59,0.85);
      color: #e2e8f0;
    }
    .btn-back {
      background: rgba(30,41,59,0.85);
      color: #fbbf24;
    }
    .race-canvas-wrap {
      width: 100%;
      max-width: 480px;
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }
  </style>
</head>
<body>

  <!-- ===== 설정 화면 ===== -->
  <div class="setup-screen" id="setupScreen">
    <div class="setup-card">
      <div class="setup-title">MAMMOTH RACING</div>
      <div class="setup-subtitle">매머드들의 레이스, 누가 1등일까?</div>

      <div class="field-group">
        <span class="field-label">참가 매머드</span>
        <span class="field-hint">이름과 색상을 설정하세요 (최대 12마리)</span>
        <div class="mammoth-list" id="mammothList"></div>
        <button class="btn-add-mammoth" id="addMammothBtn">+ 매머드 추가</button>
        <div class="mammoth-count" id="mammothCount">3마리 참가</div>
      </div>

      <div class="field-group">
        <span class="field-label">카메라가 따라갈 등수</span>
        <span class="field-hint">해당 등수 매머드를 화면 중심으로 추적합니다</span>
        <select id="focusRankSelect"></select>
      </div>

      <button class="btn-start" id="startBtn">▶  레이스 시작</button>
    </div>
  </div>

  <!-- ===== 레이스 화면 ===== -->
  <div class="race-screen" id="raceScreen">
    <div class="race-topbar">
      <button class="btn-pause" id="pauseBtn">⏸ 일시정지</button>
      <button class="btn-reset" id="resetBtn">↻ 다시시작</button>
      <button class="btn-back" id="backBtn">← 설정</button>
    </div>
    <div class="race-canvas-wrap" id="canvasWrap">
      <canvas id="raceCanvas"></canvas>
    </div>
  </div>

  <script>
    const RACE_DURATION = 20000;
    const TRACK_LENGTH = 4000;
    const DISPLAY_METERS = 300;
    const LANE_COUNT = 8;
    const BASE_SPEED = TRACK_LENGTH / (RACE_DURATION / 1000);

    const canvas = document.getElementById('raceCanvas');
    const ctx = canvas.getContext('2d');
    let W = 0, H = 0;

    function resizeCanvas() {
      const wrap = document.getElementById('canvasWrap');
      W = wrap.clientWidth;
      H = wrap.clientHeight;
      const dpr = window.devicePixelRatio || 1;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener('resize', resizeCanvas);

    let mammoths = [];
    let raceStartTime = null;
    let raceRunning = false;
    let raceFinished = false;
    let racePaused = false;
    let pausedAt = 0;
    let pausedTotal = 0;
    let focusRank = 1;
    let cameraX = 0;
    let lastFrameTime = 0;
    let cloudParticles = [];
    let dustParticles = [];
    let finishOrder = [];
    let lastNames = null;
    let lastColors = null;

    function toMeters(x) {
      return Math.round((x / TRACK_LENGTH) * DISPLAY_METERS);
    }

    const MAMMOTH_COLORS = [
      '#e74c3c','#3498db','#2ecc71','#f39c12',
      '#9b59b6','#1abc9c','#e67e22','#ec407a',
      '#26c6da','#ff7043','#66bb6a','#ab47bc'
    ];

    // ===== 구름 =====
    function initClouds() {
      cloudParticles = [];
      for (let i = 0; i < 12; i++) {
        cloudParticles.push({
          x: Math.random() * W * 4 - W,
          y: H * 0.03 + Math.random() * H * 0.18,
          w: 60 + Math.random() * 80,
          h: 20 + Math.random() * 15,
          speed: 0.08 + Math.random() * 0.12,
          opacity: 0.5 + Math.random() * 0.35
        });
      }
    }
    function updateClouds() {
      for (const c of cloudParticles) {
        c.x += c.speed;
        if (c.x - c.w > W * 2) c.x = -c.w - W * 0.5;
      }
    }
    function drawClouds() {
      for (const c of cloudParticles) {
        const sx = c.x - cameraX * 0.01;
        if (sx + c.w < -20 || sx - c.w > W + 20) continue;
        ctx.globalAlpha = c.opacity;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.ellipse(sx, c.y, c.w / 2, c.h / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(sx - c.w * 0.25, c.y + 2, c.w * 0.35, c.h * 0.4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(sx + c.w * 0.25, c.y + 1, c.w * 0.3, c.h * 0.35, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // ===== 먼지 =====
    function spawnDust(wx, wy, color) {
      if (dustParticles.length > 200) return;
      for (let i = 0; i < 2; i++) {
        dustParticles.push({
          x: wx - 8 - Math.random() * 6, y: wy + Math.random() * 4 - 2,
          vx: -(Math.random() * 1.2 + 0.4), vy: -(Math.random() * 1),
          life: 1, decay: 0.025 + Math.random() * 0.02,
          r: Math.random() * 3.5 + 1.5, color
        });
      }
    }
    function updateDust() {
      for (let i = dustParticles.length - 1; i >= 0; i--) {
        const d = dustParticles[i];
        d.x += d.vx; d.y += d.vy; d.vy += 0.04; d.life -= d.decay;
        if (d.life <= 0) dustParticles.splice(i, 1);
      }
    }
    function drawDust() {
      for (const d of dustParticles) {
        const sx = d.x - cameraX + W * 0.35;
        if (sx < -15 || sx > W + 15) continue;
        ctx.globalAlpha = d.life * 0.4;
        ctx.fillStyle = d.color;
        ctx.beginPath();
        ctx.arc(sx, d.y, d.r * d.life, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // ===== 서울 배경 =====
    function drawBackground() {
      // 하늘
      const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.42);
      skyGrad.addColorStop(0, '#3a8fd4');
      skyGrad.addColorStop(0.35, '#6cb4e6');
      skyGrad.addColorStop(0.7, '#9fd4f0');
      skyGrad.addColorStop(1, '#d0ecf8');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, W, H);

      // 뒤쪽 산 (부드러운 실루엣)
      drawMtnSilhouette(H * 0.24, H * 0.08, '#88b8a5', 0.008, 200);
      drawMtnSilhouette(H * 0.27, H * 0.06, '#9ac8ae', 0.014, 160);

      // 건물 실루엣 (뒤쪽, 흐릿하게)
      drawBuildingSilhouettes(H * 0.30, 0.018, '#b0bec5', 0.4);
      // 건물 실루엣 (앞쪽, 조금 더 진하게)
      drawBuildingSilhouettes(H * 0.33, 0.03, '#90a4ae', 0.6);

      // 한강
      const riverY = H * 0.34;
      const riverH = H * 0.04;
      const riverGrad = ctx.createLinearGradient(0, riverY, 0, riverY + riverH);
      riverGrad.addColorStop(0, '#7ec8e0');
      riverGrad.addColorStop(0.5, '#6ab8d8');
      riverGrad.addColorStop(1, '#80c8d8');
      ctx.fillStyle = riverGrad;
      ctx.fillRect(0, riverY, W, riverH);
      // 반짝임
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      for (let rx = -20; rx < W + 20; rx += 12) {
        const ry = riverY + 2 + Math.sin(rx * 0.08 + cameraX * 0.003) * 2;
        ctx.fillRect(rx, ry, 6, 1);
      }

      // 잔디/녹지
      const grassY = riverY + riverH;
      const grassGrad = ctx.createLinearGradient(0, grassY, 0, H * 0.42);
      grassGrad.addColorStop(0, '#6aaa48');
      grassGrad.addColorStop(1, '#5a9a3a');
      ctx.fillStyle = grassGrad;
      ctx.fillRect(0, grassY, W, H * 0.42 - grassY);

      // 트랙 이후 바닥
      const trackBot = H * 0.88;
      const botGrad = ctx.createLinearGradient(0, trackBot, 0, H);
      botGrad.addColorStop(0, '#5a9a3a');
      botGrad.addColorStop(1, '#4a8a30');
      ctx.fillStyle = botGrad;
      ctx.fillRect(0, trackBot, W, H - trackBot);
    }

    function drawMtnSilhouette(baseY, maxH, color, parallax, segW) {
      const offset = cameraX * parallax;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(-10, baseY + maxH);
      for (let x = -segW; x <= W + segW; x += segW / 5) {
        const wx = x + offset;
        const n = Math.sin(wx * 0.005) * 0.5 + Math.sin(wx * 0.002 + 1.8) * 0.3 + Math.sin(wx * 0.01) * 0.2;
        ctx.lineTo(x, baseY - maxH * (0.4 + n * 0.5));
      }
      ctx.lineTo(W + 10, baseY + maxH);
      ctx.closePath();
      ctx.fill();
    }

    function drawBuildingSilhouettes(baseY, parallax, color, opacity) {
      const offset = cameraX * parallax;
      ctx.globalAlpha = opacity;
      ctx.fillStyle = color;

      const blds = [
        [0,16,40],[22,12,28],[38,20,52],[64,10,24],[78,14,36],
        [98,8,60],[110,18,34],[134,14,44],[154,10,28],[168,16,38],
        [190,12,50],[208,18,30],[232,14,46],[252,10,24],[266,20,56],
        [292,12,32],[308,16,42],[330,10,26],[344,18,48],[368,14,36],
        [388,12,54],[406,16,30],[428,20,44],[454,10,28],[468,14,38],
      ];
      const repeatW = 490;

      for (let rep = -1; rep <= Math.ceil(W / repeatW) + 2; rep++) {
        const bx = rep * repeatW - (offset % repeatW);
        blds.forEach(([x, w, h]) => {
          const sx = bx + x;
          if (sx + w < -5 || sx > W + 5) return;
          ctx.fillRect(sx, baseY - h, w, h + 10);
        });
      }
      ctx.globalAlpha = 1;
    }

    // ===== 트랙 =====
    function drawTrack() {
      const tTop = H * 0.42;
      const tBot = H * 0.88;

      // 트랙 본체 (흙길 느낌)
      const tg = ctx.createLinearGradient(0, tTop, 0, tBot);
      tg.addColorStop(0, '#c4a060');
      tg.addColorStop(0.3, '#d4b070');
      tg.addColorStop(0.5, '#dabb78');
      tg.addColorStop(0.7, '#d4b070');
      tg.addColorStop(1, '#b89858');
      ctx.fillStyle = tg;
      ctx.fillRect(0, tTop, W, tBot - tTop);

      // 트랙 가장자리 (잔디 경계선)
      ctx.fillStyle = '#5a9840';
      ctx.fillRect(0, tTop - 3, W, 4);
      ctx.fillRect(0, tBot - 1, W, 4);

      // 트랙 표면 텍스처 라인
      ctx.setLineDash([6, 12]);
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 1;
      const trackH = tBot - tTop;
      for (let i = 1; i < 6; i++) {
        ctx.beginPath(); ctx.moveTo(0, tTop + trackH * i / 6); ctx.lineTo(W, tTop + trackH * i / 6); ctx.stroke();
      }
      ctx.setLineDash([]);

      // 거리 마커
      ctx.font = '9px system-ui';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      for (let m = 50; m < DISPLAY_METERS; m += 50) {
        const worldX = (m / DISPLAY_METERS) * TRACK_LENGTH;
        const sx = worldX - cameraX + W * 0.35;
        if (sx < -10 || sx > W + 10) continue;
        ctx.fillStyle = 'rgba(120,90,50,0.25)';
        ctx.fillRect(sx - 0.5, tTop, 1, tBot - tTop);
        ctx.fillStyle = 'rgba(120,90,50,0.5)';
        ctx.fillText(`${m}m`, sx, tBot + 4);
      }

      // 결승선
      const fsx = TRACK_LENGTH - cameraX + W * 0.35;
      if (fsx > -50 && fsx < W + 50) {
        const ss = 7, fw = 14;
        for (let r = 0; r < Math.ceil((tBot - tTop) / ss); r++) {
          for (let c = 0; c < Math.ceil(fw / ss); c++) {
            ctx.fillStyle = (r + c) % 2 === 0 ? 'rgba(255,255,255,0.9)' : 'rgba(30,30,40,0.85)';
            ctx.fillRect(fsx - fw / 2 + c * ss, tTop + r * ss, ss, ss);
          }
        }
        ctx.font = 'bold 10px system-ui';
        ctx.fillStyle = '#d4380d';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText('FINISH', fsx, tTop - 4);
      }

      // 스타트
      const ssx = -cameraX + W * 0.35;
      if (ssx > -20 && ssx < W + 20) {
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(ssx, tTop); ctx.lineTo(ssx, tBot); ctx.stroke();
        ctx.font = 'bold 9px system-ui';
        ctx.fillStyle = 'rgba(90,70,40,0.5)';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText('START', ssx, tTop - 4);
      }
    }

    // ===== 매머드 =====
    function drawMammoth(sx, by, m, scale, phase) {
      const s = scale;
      ctx.save();
      ctx.translate(sx, by);
      const bounce = Math.sin(phase * 8) * 2 * s;
      const legSwing = Math.sin(phase * 8) * 12;

      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.beginPath();
      ctx.ellipse(0, 16 * s, 26 * s, 5 * s, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.translate(0, bounce);
      const bc = m.color;
      const dc = shadeColor(bc, -30);
      const lc = shadeColor(bc, 30);

      const blp1 = Math.sin(phase * 8) * legSwing;
      const blp2 = Math.sin(phase * 8 + Math.PI) * legSwing;
      drawLeg(-13 * s, 5 * s, 7 * s, 20 * s, dc, blp1 * 0.3);
      drawLeg(7 * s, 5 * s, 7 * s, 20 * s, dc, blp2 * 0.3);

      ctx.strokeStyle = dc; ctx.lineWidth = 2.5 * s; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-20 * s, -3 * s);
      const tw = Math.sin(phase * 6) * 4 * s;
      ctx.quadraticCurveTo(-28 * s, -10 * s + tw, -24 * s, -16 * s + tw);
      ctx.stroke();

      const bg = ctx.createRadialGradient(0, 0, 2 * s, 0, 0, 22 * s);
      bg.addColorStop(0, lc); bg.addColorStop(0.6, bc); bg.addColorStop(1, dc);
      ctx.fillStyle = bg;
      ctx.beginPath();
      ctx.ellipse(0, 0, 22 * s, 13 * s, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = dc; ctx.lineWidth = 1.2 * s; ctx.stroke();

      ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 0.7 * s;
      for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        ctx.moveTo((-12 + i * 5) * s, (-7 + (i % 3) * 3) * s);
        ctx.lineTo((-14 + i * 5) * s, (-3 + (i % 3) * 3) * s);
        ctx.stroke();
      }

      const flp1 = Math.sin(phase * 8 + Math.PI * 0.5) * legSwing;
      const flp2 = Math.sin(phase * 8 + Math.PI * 1.5) * legSwing;
      drawLeg(-9 * s, 7 * s, 8 * s, 20 * s, bc, flp1 * 0.3);
      drawLeg(11 * s, 7 * s, 8 * s, 20 * s, bc, flp2 * 0.3);

      const hg = ctx.createRadialGradient(15 * s, -5 * s, 1 * s, 15 * s, -5 * s, 12 * s);
      hg.addColorStop(0, lc); hg.addColorStop(1, bc);
      ctx.fillStyle = hg;
      ctx.beginPath();
      ctx.ellipse(15 * s, -5 * s, 11 * s, 9 * s, -0.15, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = dc; ctx.lineWidth = 1.2 * s; ctx.stroke();

      ctx.fillStyle = dc;
      ctx.beginPath();
      ctx.ellipse(7 * s, -12 * s, 4 * s, 6 * s, -0.3, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(19 * s, -8 * s, 2.5 * s, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath(); ctx.arc(20 * s, -8 * s, 1.3 * s, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath(); ctx.arc(20.5 * s, -9 * s, 0.6 * s, 0, Math.PI * 2); ctx.fill();

      ctx.strokeStyle = '#f0ead8'; ctx.lineWidth = 2 * s; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(22 * s, -1 * s); ctx.quadraticCurveTo(29 * s, 5 * s, 26 * s, 10 * s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(20 * s, 0); ctx.quadraticCurveTo(27 * s, 7 * s, 24 * s, 12 * s); ctx.stroke();

      ctx.strokeStyle = dc; ctx.lineWidth = 3 * s;
      const trw = Math.sin(phase * 4) * 2.5 * s;
      ctx.beginPath();
      ctx.moveTo(24 * s, -1 * s);
      ctx.quadraticCurveTo(27 * s, 3 * s + trw, 24 * s, 8 * s + trw);
      ctx.quadraticCurveTo(22 * s, 12 * s + trw, 20 * s, 10 * s + trw);
      ctx.stroke();

      ctx.restore();
    }

    function drawLeg(x, y, lw, lh, color, rot) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rot * Math.PI / 180);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.roundRect(-lw / 2, 0, lw, lh, [0, 0, lw * 0.4, lw * 0.4]);
      ctx.fill();
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.beginPath();
      ctx.ellipse(0, lh, lw * 0.5, lw * 0.25, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function shadeColor(c, p) {
      const n = parseInt(c.replace('#', ''), 16);
      const r = Math.min(255, Math.max(0, ((n >> 16) & 0xff) + p));
      const g = Math.min(255, Math.max(0, ((n >> 8) & 0xff) + p));
      const b = Math.min(255, Math.max(0, (n & 0xff) + p));
      return `rgb(${r},${g},${b})`;
    }

    // ===== 매머드 + 인디케이터 =====
    function drawMammothsAndIndicators(now) {
      const offL = [], offR = [];
      const tTop = H * 0.42, tBot = H * 0.88;
      const trackH = tBot - tTop;
      const pad = trackH * 0.08;

      // z값(0~1)으로 깊이 정렬: z 작을수록 뒤(위), z 클수록 앞(아래) → 먼저 그림
      const sorted = [...mammoths].sort((a, b) => a.z - b.z);

      for (const m of sorted) {
        const sx = m.x - cameraX + W * 0.35;
        const ly = tTop + pad + m.z * (trackH - pad * 2);
        const scale = 0.45 + m.z * 0.4;

        if (sx < -70 || sx > W + 70) {
          if (sx < 0) offL.push(m); else offR.push(m);
          continue;
        }

        const phase = raceRunning && !racePaused ? (now - raceStartTime - pausedTotal) / 1000 + m.index * 0.5 : 0;
        drawMammoth(sx, ly, m, scale, m.finished ? 0 : phase);

        if (raceRunning && !m.finished && !racePaused) spawnDust(m.x, ly, 'rgba(180,160,120,0.3)');

        ctx.font = `bold ${10 * scale}px system-ui`;
        const txtW = ctx.measureText(m.name).width;
        const labX = sx - (txtW + 10) / 2;
        const labY = ly - 28 * scale;
        const labH = 14 * scale;

        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        ctx.beginPath();
        ctx.roundRect(labX, labY - labH / 2, txtW + 10, labH, 999);
        ctx.fill();
        ctx.strokeStyle = m.color; ctx.lineWidth = 1.2; ctx.stroke();
        ctx.fillStyle = '#1e293b';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(m.name, sx, labY);
      }

      drawOffscreen(offL, 'left');
      drawOffscreen(offR, 'right');
    }

    function drawOffscreen(list, side) {
      const startY = H * 0.44;
      const gap = 18;
      ctx.font = 'bold 9px system-ui';
      list.forEach((m, i) => {
        const y = startY + i * gap;
        const x = side === 'left' ? 6 : W - 6;
        const px = side === 'left' ? x + 9 : x - 82;
        ctx.fillStyle = 'rgba(255,255,255,0.82)';
        ctx.beginPath(); ctx.roundRect(px, y - 8, 73, 16, 999); ctx.fill();
        ctx.strokeStyle = m.color; ctx.lineWidth = 1.2; ctx.stroke();

        ctx.fillStyle = m.color;
        ctx.beginPath();
        if (side === 'left') {
          ctx.moveTo(x, y); ctx.lineTo(x + 7, y - 5); ctx.lineTo(x + 7, y + 5);
        } else {
          ctx.moveTo(x, y); ctx.lineTo(x - 7, y - 5); ctx.lineTo(x - 7, y + 5);
        }
        ctx.closePath(); ctx.fill();

        ctx.fillStyle = '#1e293b';
        ctx.textAlign = side === 'left' ? 'left' : 'right';
        ctx.textBaseline = 'middle';
        ctx.fillText(m.name, side === 'left' ? x + 13 : x - 13, y);
      });
    }

    // ===== 미니맵 + 순위 오버레이 =====
    function drawOverlayPanel() {
      const pad = 6;
      const panelW = Math.min(W * 0.42, 180);
      const miniH = 28;
      const x = pad, y = pad;

      ctx.fillStyle = 'rgba(255,255,255,0.88)';
      ctx.beginPath(); ctx.roundRect(x, y, panelW, miniH, 8); ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.lineWidth = 1; ctx.stroke();

      const ip = 8;
      const tx = x + ip, ty = y + miniH / 2, tiw = panelW - ip * 2;

      ctx.strokeStyle = 'rgba(100,100,100,0.3)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(tx + tiw, ty); ctx.stroke();

      ctx.fillStyle = '#d4380d';
      ctx.fillRect(tx + tiw - 1, ty - 4, 2, 8);

      for (const m of mammoths) {
        const p = Math.min(m.x / TRACK_LENGTH, 1);
        ctx.fillStyle = m.color;
        ctx.beginPath(); ctx.arc(tx + tiw * p, ty, 2.5, 0, Math.PI * 2); ctx.fill();
      }

      const cs = Math.max(0, cameraX / TRACK_LENGTH);
      const ce = Math.min(1, (cameraX + W * 0.6) / TRACK_LENGTH);
      const cx1 = tx + tiw * cs, cx2 = tx + tiw * ce;
      ctx.fillStyle = 'rgba(249,115,22,0.12)';
      ctx.fillRect(cx1, ty - 5, cx2 - cx1, 10);
      ctx.strokeStyle = 'rgba(249,115,22,0.35)'; ctx.lineWidth = 0.8;
      ctx.strokeRect(cx1, ty - 5, cx2 - cx1, 10);

      ctx.font = 'bold 7px system-ui';
      ctx.fillStyle = '#94a3b8';
      ctx.textAlign = 'left'; ctx.textBaseline = 'top';
      ctx.fillText('MAP', x + 5, y + 3);

      // 순위
      if (!mammoths.length) return;
      const ranking = getCurrentRanking();
      const rankY = y + miniH + 4;
      const rowH = 16;
      const rankH = ranking.length * rowH + 8;

      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath(); ctx.roundRect(x, rankY, panelW, rankH, 8); ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.08)'; ctx.lineWidth = 1; ctx.stroke();

      ctx.font = 'bold 7px system-ui';
      ctx.fillStyle = '#94a3b8';
      ctx.textAlign = 'left'; ctx.textBaseline = 'top';
      ctx.fillText(raceFinished ? 'RESULT' : 'RANK', x + 5, rankY + 2);

      ranking.forEach(({ rank, m }, i) => {
        const ry = rankY + 4 + i * rowH;
        const isFocus = rank === focusRank;
        const isWinner = raceFinished && rank === 1;

        if (isWinner) {
          ctx.fillStyle = 'rgba(251,191,36,0.18)';
          ctx.beginPath(); ctx.roundRect(x + 3, ry + 1, panelW - 6, rowH - 2, 4); ctx.fill();
        } else if (isFocus) {
          ctx.fillStyle = 'rgba(249,115,22,0.12)';
          ctx.beginPath(); ctx.roundRect(x + 3, ry + 1, panelW - 6, rowH - 2, 4); ctx.fill();
        }

        ctx.font = 'bold 10px system-ui';
        ctx.fillStyle = rank <= 3 ? '#d4380d' : '#94a3b8';
        ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        ctx.fillText(`${rank}`, x + 8, ry + rowH / 2 + 1);

        ctx.fillStyle = m.color;
        ctx.beginPath(); ctx.arc(x + 22, ry + rowH / 2 + 1, 3.5, 0, Math.PI * 2); ctx.fill();

        ctx.font = '10px system-ui';
        ctx.fillStyle = '#1e293b';
        ctx.textAlign = 'left';
        const maxNW = panelW - 75;
        let dn = m.name;
        while (ctx.measureText(dn).width > maxNW && dn.length > 2) dn = dn.slice(0, -1);
        if (dn !== m.name) dn += '…';
        ctx.fillText(dn, x + 31, ry + rowH / 2 + 1);

        ctx.font = '9px system-ui';
        ctx.fillStyle = '#64748b';
        ctx.textAlign = 'right';
        ctx.fillText(m.finished ? `${DISPLAY_METERS}m` : `${toMeters(m.x)}m`, x + panelW - 6, ry + rowH / 2 + 1);
      });
    }

    // ===== 레이스 로직 =====
    function initRace(names, colors) {
      const n = names.length;
      if (!n) return;
      mammoths = []; finishOrder = []; dustParticles = [];
      const lc = Math.min(LANE_COUNT, n);
      lastNames = [...names];
      lastColors = colors ? [...colors] : null;

      for (let i = 0; i < n; i++) {
        mammoths.push({
          name: names[i].trim() || `매머드 ${i + 1}`,
          color: (colors && colors[i]) ? colors[i] : MAMMOTH_COLORS[i % MAMMOTH_COLORS.length],
          laneIndex: i % lc, x: 0, velocity: BASE_SPEED,
          z: (i / Math.max(1, n - 1)),
          zTarget: (i / Math.max(1, n - 1)),
          zVel: 0,
          colliding: false,
          collideTimer: 0,
          finished: false, index: i,
          burstTimer: 0, burstAmount: 0, stumbleTimer: 0
        });
      }

      initClouds();
      raceStartTime = performance.now();
      raceRunning = true; raceFinished = false;
      racePaused = false; pausedAt = 0; pausedTotal = 0;
      cameraX = 0; lastFrameTime = raceStartTime;
      resizeCanvas();
      requestAnimationFrame(loop);
    }

    function updateRace(now) {
      if (!raceRunning) return;
      const elapsed = now - raceStartTime - pausedTotal;
      const dt = Math.min(now - lastFrameTime, 50);
      lastFrameTime = now;
      let allFinished = true;

      // Z축 이동 (부드러운 리니어 이동: zTarget → z)
      // dt 기반으로 항상 비슷한 체감 속도 유지
      const zAlpha = 1 - Math.exp(-dt / 260);
      for (const m of mammoths) {
        if (m.finished) continue;
        // 타겟을 천천히 흔들어주고(뚝뚝 끊김 방지) 그 쪽으로 리니어 이동
        m.zTarget += (Math.random() - 0.5) * 0.015;
        m.zTarget = Math.max(0.04, Math.min(0.96, m.zTarget));
        // 충돌 반발은 zVel로 순간적으로 얹고, 빠르게 감쇠
        m.zVel *= 0.86;
        m.z += (m.zTarget - m.z) * zAlpha + m.zVel;
        m.z = Math.max(0.02, Math.min(0.98, m.z));
      }

      // 충돌 판정 (x와 z 모두 가까우면 서로 감속)
      const COLLISION_X = 60;
      const COLLISION_Z = 0.11;
      for (const m of mammoths) m.colliding = false;

      for (let i = 0; i < mammoths.length; i++) {
        const a = mammoths[i];
        if (a.finished) continue;
        for (let j = i + 1; j < mammoths.length; j++) {
          const b = mammoths[j];
          if (b.finished) continue;
          const dx = Math.abs(a.x - b.x);
          const dz = Math.abs(a.z - b.z);
          if (dx < COLLISION_X && dz < COLLISION_Z) {
            a.colliding = true;
            b.colliding = true;
            // z 방향으로 "팍" 밀어냄 (즉시 분리 + 반발)
            const overlap = (COLLISION_Z - dz);
            const dir = (a.z <= b.z) ? -1 : 1;
            const sep = overlap * 0.55; // 즉시 분리량 (체감용)
            a.z += dir * sep;
            b.z -= dir * sep;
            a.z = Math.max(0.02, Math.min(0.98, a.z));
            b.z = Math.max(0.02, Math.min(0.98, b.z));
            // 타겟도 함께 밀어서 다시 겹치려는 경향을 줄임
            a.zTarget = Math.max(0.04, Math.min(0.96, a.zTarget + dir * sep));
            b.zTarget = Math.max(0.04, Math.min(0.96, b.zTarget - dir * sep));
            // 순간 반발 속도
            const impulse = overlap * 0.03;
            a.zVel += dir * impulse;
            b.zVel -= dir * impulse;
          }
        }
      }

      for (const m of mammoths) {
        if (m.finished) continue;
        // 목표 속도(desired)를 만들고, 실제 속도는 비대칭으로 따라가게(가속 느림/감속 빠름)
        let desired = m.velocity;

        // 랜덤 노이즈 (짧게 흔들림)
        desired += (Math.random() - 0.5) * (BASE_SPEED * 0.18);

        // 기본 속도 쪽으로 약하게 당김
        desired += (BASE_SPEED - desired) * 0.02;

        // 버스트
        if (m.burstTimer > 0) { desired += m.burstAmount; m.burstTimer -= dt; }
        else if (Math.random() < 0.003) { m.burstTimer = 800 + Math.random() * 1200; m.burstAmount = BASE_SPEED * (0.05 + Math.random() * 0.12); }

        // 슬로우(실수)
        if (m.stumbleTimer > 0) { desired -= BASE_SPEED * 0.22; m.stumbleTimer -= dt; }
        else if (Math.random() < 0.002) { m.stumbleTimer = 500 + Math.random() * 800; }

        // 충돌 중이면 강한 감속 체감
        if (m.colliding) {
          desired -= BASE_SPEED * 0.35;
          m.collideTimer = 380;
        } else if (m.collideTimer > 0) {
          m.collideTimer -= dt;
        }

        // 클램프(원래 범위 유지)
        desired = Math.max(BASE_SPEED * 0.7, Math.min(BASE_SPEED * 1.4, desired));

        // 가속은 천천히, 감속은 빠르게
        const diff = desired - m.velocity;
        const accelFollow = 0.06;
        const decelFollow = 0.22;
        m.velocity += diff * (diff >= 0 ? accelFollow : decelFollow);

        const remaining = RACE_DURATION - elapsed;
        if (remaining < 6000 && remaining > 0) {
          m.velocity += (1 - m.x / TRACK_LENGTH) * (6000 - remaining) / 6000 * (BASE_SPEED * 0.1);
        }

        m.x += (m.velocity * dt) / 1000;
        if (m.x >= TRACK_LENGTH) { m.x = TRACK_LENGTH; m.finished = true; finishOrder.push(m); }
        else allFinished = false;
      }

      const ranking = getCurrentRanking();
      const fe = ranking[focusRank - 1] || ranking[0];
      if (fe) {
        const clamped = Math.max(-W * 0.1, Math.min(TRACK_LENGTH - W * 0.5, fe.m.x - W * 0.32));
        cameraX += (clamped - cameraX) * 0.08;
      }

      if (elapsed >= RACE_DURATION * 1.8 || allFinished) {
        raceRunning = false; raceFinished = true;
      }
    }

    function getCurrentRanking() {
      return mammoths
        .map(m => ({ m, x: m.x }))
        .sort((a, b) => b.x - a.x)
        .map((e, i) => ({ rank: i + 1, m: e.m }));
    }

    function drawResultBanner() {
      if (!raceFinished || !finishOrder.length) return;
      const winner = finishOrder[0];
      if (!winner) return;
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.fillRect(0, 0, W, H * 0.08);
      const fs = Math.min(W * 0.04, 18);
      ctx.font = `bold ${fs}px system-ui`;
      ctx.fillStyle = '#d4380d';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(`1st  ${winner.name}`, W / 2, H * 0.04);
    }

    function drawPausedOverlay() {
      if (!racePaused) return;
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(0, H * 0.45, W, H * 0.1);
      ctx.font = `bold ${Math.min(W * 0.06, 28)}px system-ui`;
      ctx.fillStyle = '#1e293b';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('PAUSED', W / 2, H * 0.5);
    }

    function render(now) {
      ctx.clearRect(0, 0, W, H);
      drawBackground();
      drawClouds();
      drawTrack();
      drawDust();
      drawMammothsAndIndicators(now);
      drawOverlayPanel();
      drawResultBanner();
      drawPausedOverlay();
    }

    function loop(now) {
      if (!mammoths.length) { render(performance.now()); return; }
      if (!racePaused) { updateRace(now); updateClouds(); updateDust(); }
      render(now);
      if (raceRunning) requestAnimationFrame(loop);
      else render(performance.now());
    }

    // ===== 화면 전환 + 설정 UI =====
    const setupScreen = document.getElementById('setupScreen');
    const raceScreen = document.getElementById('raceScreen');
    const mammothListEl = document.getElementById('mammothList');
    const addMammothBtn = document.getElementById('addMammothBtn');
    const focusRankSelect = document.getElementById('focusRankSelect');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const backBtn = document.getElementById('backBtn');
    const mammothCountEl = document.getElementById('mammothCount');

    const MAX_MAMMOTHS = 12;
    const INITIAL_COUNT = 3;
    const DEFAULT_NAMES = ['토르','블리자드','썬더','아이스','매그마','스톰','루비','노바','타이탄','제트','코코','미스트'];

    let usedColors = new Set();

    function getAvailableColor() {
      for (const c of MAMMOTH_COLORS) {
        if (!usedColors.has(c)) { usedColors.add(c); return c; }
      }
      const fallback = '#' + Math.floor(Math.random() * 0xffffff).toString(16).padStart(6, '0');
      usedColors.add(fallback);
      return fallback;
    }

    function releaseColor(color) {
      usedColors.delete(color);
    }

    function getMammothRows() {
      return mammothListEl.querySelectorAll('.mammoth-row');
    }

    function updateMammothUI() {
      const rows = getMammothRows();
      const count = rows.length;
      mammothCountEl.textContent = `${count}마리 참가`;
      addMammothBtn.disabled = count >= MAX_MAMMOTHS;
      rows.forEach((row, i) => {
        row.querySelector('.mammoth-row-num').textContent = `${i + 1}`;
        const removeBtn = row.querySelector('.btn-remove-mammoth');
        removeBtn.style.visibility = count <= 2 ? 'hidden' : 'visible';
      });
      setCameraOptions(count);
    }

    function createMammothRow(name, color) {
      const row = document.createElement('div');
      row.className = 'mammoth-row';

      const num = document.createElement('span');
      num.className = 'mammoth-row-num';
      num.textContent = '1';

      const colorInput = document.createElement('input');
      colorInput.type = 'color';
      colorInput.value = color;
      colorInput.addEventListener('input', () => {
        releaseColor(color);
        color = colorInput.value;
        usedColors.add(color);
      });

      const nameInput = document.createElement('input');
      nameInput.type = 'text';
      nameInput.placeholder = '매머드 이름';
      nameInput.value = name;

      const removeBtn = document.createElement('button');
      removeBtn.className = 'btn-remove-mammoth';
      removeBtn.textContent = '×';
      removeBtn.addEventListener('click', () => {
        releaseColor(colorInput.value);
        row.remove();
        updateMammothUI();
      });

      row.appendChild(num);
      row.appendChild(colorInput);
      row.appendChild(nameInput);
      row.appendChild(removeBtn);

      return row;
    }

    function addMammoth(name, color) {
      if (getMammothRows().length >= MAX_MAMMOTHS) return;
      if (!color) color = getAvailableColor();
      if (!name) {
        const existingNames = new Set();
        getMammothRows().forEach(r => existingNames.add(r.querySelector('input[type="text"]').value));
        name = DEFAULT_NAMES.find(n => !existingNames.has(n)) || `매머드 ${getMammothRows().length + 1}`;
      }
      const row = createMammothRow(name, color);
      mammothListEl.appendChild(row);
      updateMammothUI();
    }

    function collectMammothData() {
      const data = [];
      getMammothRows().forEach(row => {
        const name = row.querySelector('input[type="text"]').value.trim() || `매머드 ${data.length + 1}`;
        const color = row.querySelector('input[type="color"]').value;
        data.push({ name, color });
      });
      return data;
    }

    function setCameraOptions(count) {
      const cur = parseInt(focusRankSelect.value, 10) || 1;
      focusRankSelect.innerHTML = '';
      for (let i = 1; i <= count; i++) {
        const o = document.createElement('option');
        o.value = String(i); o.textContent = `${i}등`;
        focusRankSelect.appendChild(o);
      }
      focusRankSelect.value = String(Math.max(1, Math.min(count, cur)));
      focusRank = parseInt(focusRankSelect.value, 10);
    }

    focusRankSelect.addEventListener('change', () => {
      focusRank = parseInt(focusRankSelect.value, 10) || 1;
    });

    addMammothBtn.addEventListener('click', () => addMammoth());

    function showRaceScreen() {
      setupScreen.classList.add('hidden');
      raceScreen.classList.add('active');
      pauseBtn.textContent = '⏸ 일시정지';
    }
    function showSetupScreen() {
      raceScreen.classList.remove('active');
      setupScreen.classList.remove('hidden');
      raceRunning = false; racePaused = false;
    }

    startBtn.addEventListener('click', () => {
      const data = collectMammothData();
      if (data.length < 2) return;
      setCameraOptions(data.length);
      showRaceScreen();
      setTimeout(() => initRaceWithData(data), 50);
    });

    function initRaceWithData(data) {
      const names = data.map(d => d.name);
      const colors = data.map(d => d.color);
      lastNames = names;
      lastColors = colors;
      initRace(names, colors);
    }

    pauseBtn.addEventListener('click', () => {
      if (!raceRunning) return;
      if (!racePaused) {
        racePaused = true; pausedAt = performance.now();
        pauseBtn.textContent = '▶ 재개';
      } else {
        racePaused = false;
        pausedTotal += (performance.now() - pausedAt);
        lastFrameTime = performance.now();
        pausedAt = 0;
        pauseBtn.textContent = '⏸ 일시정지';
        requestAnimationFrame(loop);
      }
    });

    resetBtn.addEventListener('click', () => {
      if (!lastNames || !lastNames.length) return;
      pauseBtn.textContent = '⏸ 일시정지';
      initRace(lastNames, lastColors);
    });

    backBtn.addEventListener('click', showSetupScreen);

    // 초기 매머드 3마리 생성
    for (let i = 0; i < INITIAL_COUNT; i++) {
      addMammoth(DEFAULT_NAMES[i], MAMMOTH_COLORS[i])
    }
  </script>
</body>
</html>
