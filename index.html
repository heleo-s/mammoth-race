<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>매머드 레이싱</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <style>
    :root {
      --bg: #0d1117;
      --accent: #f97316;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a0e1a;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .container {
      width: 100%;
      max-width: 1100px;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ===== Header ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .title {
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-size: 1.1rem;
      background: linear-gradient(90deg, #f97316, #fbbf24, #f97316);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      background: rgba(15,23,42,0.8);
      border-radius: 14px;
      padding: 6px 12px;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(148,163,184,0.2);
    }
    .chip-label {
      font-size: 0.72rem;
      color: var(--muted);
      padding: 2px 6px;
    }
    input, select {
      border-radius: 8px;
      border: 1px solid rgba(148,163,184,0.4);
      background: rgba(15,23,42,0.95);
      color: var(--text);
      font-size: 0.8rem;
      padding: 5px 10px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus {
      border-color: var(--accent);
    }
    input::placeholder { color: rgba(148,163,184,0.6); }
    button {
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #f97316, #fb923c);
      color: #111827;
      font-weight: 700;
      font-size: 0.82rem;
      padding: 6px 16px;
      box-shadow: 0 6px 20px rgba(248,113,22,0.5);
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      white-space: nowrap;
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(248,113,22,0.6); }
    button:active { transform: translateY(1px); box-shadow: 0 2px 10px rgba(248,113,22,0.3); }
    button[disabled] { opacity: 0.35; box-shadow: none; cursor: default; filter: grayscale(0.5); transform: none; }

    /* ===== Main Layout ===== */
    .main {
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 10px;
    }
    @media (max-width: 720px) {
      .main { grid-template-columns: 1fr; }
    }
    .canvas-wrapper {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      background: #0f172a;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(148,163,184,0.1);
      aspect-ratio: 16 / 9;
      min-height: 280px;
    }
    canvas { width: 100%; height: 100%; display: block; }

    /* ===== Side Panel ===== */
    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .card {
      background: rgba(15,23,42,0.92);
      border-radius: 14px;
      padding: 10px 12px;
      border: 1px solid rgba(148,163,184,0.15);
      backdrop-filter: blur(8px);
    }
    .card-title {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .badge {
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(248,113,22,0.15);
      color: #fed7aa;
    }
    .rank-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 3px;
      font-size: 0.78rem;
      max-height: 200px;
      overflow-y: auto;
    }
    .rank-item {
      display: flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 8px;
      background: rgba(30,41,59,0.7);
      gap: 6px;
      transition: background 0.2s;
    }
    .rank-item.focus-rank {
      background: linear-gradient(90deg, rgba(248,113,22,0.25), rgba(30,41,59,0.8));
      border: 1px solid rgba(248,113,22,0.3);
    }
    .rank-item.finished-first {
      background: linear-gradient(90deg, rgba(251,191,36,0.2), rgba(30,41,59,0.8));
    }
    .rank-pos {
      font-weight: 800;
      font-size: 0.72rem;
      color: #fbbf24;
      min-width: 26px;
    }
    .rank-color {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .rank-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .rank-dist {
      font-size: 0.68rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .info-text {
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title">🦣 MAMMOTH RACING</div>
      <div class="controls">
        <span class="chip-label">참가자</span>
        <input id="namesInput" type="text" placeholder="이름1, 이름2, 이름3, ..." size="28" />
        <span class="chip-label">카메라</span>
        <select id="focusRankSelect">
          <option value="1">1등</option>
          <option value="2">2등</option>
          <option value="3">3등</option>
        </select>
        <button id="startBtn">▶ START</button>
      </div>
    </div>

    <div class="main">
      <div class="canvas-wrapper">
        <canvas id="raceCanvas"></canvas>
      </div>
      <div class="side-panel">
        <div class="card">
          <div class="card-title">
            <span>순위</span>
            <span class="badge" id="statusBadge">대기중</span>
          </div>
          <ul id="rankList" class="rank-list"></ul>
          <div class="info-text">
            매머드들의 속도는 매 순간 무작위로 변합니다.<br/>
            결과는 아무도 모릅니다. 🎲
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ===== 설정 =====
    const RACE_DURATION = 20000;
    const TRACK_LENGTH = 4000;
    const LANE_COUNT = 8;
    const BASE_SPEED = TRACK_LENGTH / (RACE_DURATION / 1000);

    const canvas = document.getElementById('raceCanvas');
    const ctx = canvas.getContext('2d');
    let W = 0, H = 0;

    function resizeCanvas() {
      const rect = canvas.parentElement.getBoundingClientRect();
      W = rect.width;
      H = rect.height;
      const dpr = window.devicePixelRatio || 1;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    let mammoths = [];
    let raceStartTime = null;
    let raceRunning = false;
    let raceFinished = false;
    let focusRank = 1;
    let cameraX = 0;
    let lastFrameTime = 0;
    let snowParticles = [];
    let dustParticles = [];
    let finishOrder = [];

    // ===== 색상 =====
    const MAMMOTH_COLORS = [
      '#e74c3c', '#3498db', '#2ecc71', '#f39c12',
      '#9b59b6', '#1abc9c', '#e67e22', '#ec407a',
      '#26c6da', '#ff7043', '#66bb6a', '#ab47bc'
    ];

    function colorFromIndex(index) {
      return MAMMOTH_COLORS[index % MAMMOTH_COLORS.length];
    }

    // ===== 눈 파티클 =====
    function initSnow() {
      snowParticles = [];
      for (let i = 0; i < 60; i++) {
        snowParticles.push({
          x: Math.random() * W * 3 - W,
          y: Math.random() * H,
          radius: Math.random() * 2.5 + 0.8,
          speedX: Math.random() * 0.3 - 0.15,
          speedY: Math.random() * 0.8 + 0.3,
          opacity: Math.random() * 0.5 + 0.2
        });
      }
    }

    function updateSnow() {
      for (const s of snowParticles) {
        s.x += s.speedX;
        s.y += s.speedY;
        if (s.y > H) { s.y = -5; s.x = Math.random() * W * 2 - W * 0.5; }
      }
    }

    function drawSnow() {
      for (const s of snowParticles) {
        const screenSnowX = s.x - cameraX * 0.02;
        if (screenSnowX < -10 || screenSnowX > W + 10) continue;
        ctx.globalAlpha = s.opacity;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(screenSnowX, s.y, s.radius, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // ===== 먼지 파티클 =====
    function spawnDust(worldX, worldY, color) {
      for (let i = 0; i < 2; i++) {
        dustParticles.push({
          x: worldX - 10 - Math.random() * 8,
          y: worldY + Math.random() * 6 - 3,
          vx: -(Math.random() * 1.5 + 0.5),
          vy: -(Math.random() * 1.2),
          life: 1.0,
          decay: 0.02 + Math.random() * 0.02,
          radius: Math.random() * 4 + 2,
          color
        });
      }
    }

    function updateDust() {
      for (let i = dustParticles.length - 1; i >= 0; i--) {
        const d = dustParticles[i];
        d.x += d.vx;
        d.y += d.vy;
        d.vy += 0.05;
        d.life -= d.decay;
        if (d.life <= 0) dustParticles.splice(i, 1);
      }
    }

    function drawDust() {
      for (const d of dustParticles) {
        const screenDustX = d.x - cameraX + W * 0.35;
        if (screenDustX < -20 || screenDustX > W + 20) continue;
        ctx.globalAlpha = d.life * 0.5;
        ctx.fillStyle = d.color || 'rgba(220,220,230,0.6)';
        ctx.beginPath();
        ctx.arc(screenDustX, d.y, d.radius * d.life, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // ===== 배경 =====
    function drawBackground() {
      // 하늘 그라데이션
      const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.55);
      skyGrad.addColorStop(0, '#0b1628');
      skyGrad.addColorStop(0.3, '#1a2744');
      skyGrad.addColorStop(0.6, '#2d4a7a');
      skyGrad.addColorStop(1, '#4a7ab5');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, W, H);

      // 별
      const starSeed = 12345;
      for (let i = 0; i < 40; i++) {
        const sx = ((starSeed * (i + 1) * 7) % (W * 2)) - cameraX * 0.005;
        const sy = ((starSeed * (i + 1) * 13) % (H * 0.4));
        const sr = ((i * 17) % 3) * 0.3 + 0.5;
        if (sx < -5 || sx > W + 5) continue;
        ctx.globalAlpha = 0.3 + (i % 5) * 0.12;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(sx, sy, sr, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      // 뒤쪽 산 (패럴랙스)
      drawMountains(H * 0.28, H * 0.22, '#1a2540', 0.015, 200);
      drawMountains(H * 0.32, H * 0.18, '#1e3050', 0.025, 150);
      drawMountains(H * 0.38, H * 0.14, '#253d60', 0.04, 120);

      // 눈 덮인 평원 (트랙 아래)
      const groundY = H * 0.42;
      const groundGrad = ctx.createLinearGradient(0, groundY, 0, H);
      groundGrad.addColorStop(0, '#c8d8e8');
      groundGrad.addColorStop(0.15, '#b0c4d8');
      groundGrad.addColorStop(0.5, '#8aa0b8');
      groundGrad.addColorStop(1, '#5a7090');
      ctx.fillStyle = groundGrad;
      ctx.fillRect(0, groundY, W, H - groundY);
    }

    function drawMountains(baseY, maxHeight, color, parallax, segWidth) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(0, H);
      const offset = cameraX * parallax;
      for (let x = -segWidth; x <= W + segWidth; x += segWidth / 3) {
        const worldMtX = x + offset;
        const noiseVal = Math.sin(worldMtX * 0.008) * 0.5
                       + Math.sin(worldMtX * 0.003 + 1.5) * 0.3
                       + Math.sin(worldMtX * 0.015) * 0.2;
        const peakY = baseY - maxHeight * (0.5 + noiseVal * 0.5);
        ctx.lineTo(x, peakY);
      }
      ctx.lineTo(W + 10, H);
      ctx.closePath();
      ctx.fill();

      // 산 꼭대기 눈
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.beginPath();
      ctx.moveTo(0, H);
      for (let x = -segWidth; x <= W + segWidth; x += segWidth / 3) {
        const worldMtX = x + offset;
        const noiseVal = Math.sin(worldMtX * 0.008) * 0.5
                       + Math.sin(worldMtX * 0.003 + 1.5) * 0.3
                       + Math.sin(worldMtX * 0.015) * 0.2;
        const peakY = baseY - maxHeight * (0.5 + noiseVal * 0.5);
        ctx.lineTo(x, peakY + maxHeight * 0.15);
      }
      ctx.lineTo(W + 10, H);
      ctx.closePath();
      ctx.fill();
    }

    // ===== 트랙 =====
    function drawTrack() {
      const trackTop = H * 0.44;
      const trackBottom = H * 0.88;

      // 트랙 본체
      const trackGrad = ctx.createLinearGradient(0, trackTop, 0, trackBottom);
      trackGrad.addColorStop(0, '#7a8a9a');
      trackGrad.addColorStop(0.2, '#8a9aaa');
      trackGrad.addColorStop(0.5, '#95a5b5');
      trackGrad.addColorStop(0.8, '#8a9aaa');
      trackGrad.addColorStop(1, '#6a7a8a');
      ctx.fillStyle = trackGrad;
      ctx.fillRect(0, trackTop, W, trackBottom - trackTop);

      // 트랙 테두리
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, trackTop);
      ctx.lineTo(W, trackTop);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, trackBottom);
      ctx.lineTo(W, trackBottom);
      ctx.stroke();

      // 레인 구분선 (점선)
      if (mammoths.length > 0) {
        const laneCount = Math.min(LANE_COUNT, mammoths.length);
        const laneH = (trackBottom - trackTop) / laneCount;
        ctx.setLineDash([12, 8]);
        ctx.strokeStyle = 'rgba(255,255,255,0.12)';
        ctx.lineWidth = 1;
        for (let i = 1; i < laneCount; i++) {
          const ly = trackTop + laneH * i;
          ctx.beginPath();
          ctx.moveTo(0, ly);
          ctx.lineTo(W, ly);
          ctx.stroke();
        }
        ctx.setLineDash([]);
      }

      // 거리 마커
      ctx.font = '9px system-ui';
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      const markerInterval = 500;
      for (let dist = markerInterval; dist < TRACK_LENGTH; dist += markerInterval) {
        const screenMarkerX = dist - cameraX + W * 0.35;
        if (screenMarkerX < -10 || screenMarkerX > W + 10) continue;
        ctx.fillRect(screenMarkerX - 0.5, trackTop, 1, trackBottom - trackTop);
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillText(`${dist}m`, screenMarkerX, trackBottom + 4);
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
      }

      // 결승선
      const finishScreenX = TRACK_LENGTH - cameraX + W * 0.35;
      if (finishScreenX > -60 && finishScreenX < W + 60) {
        const stripeSize = 8;
        const finishW = 16;
        for (let row = 0; row < Math.ceil((trackBottom - trackTop) / stripeSize); row++) {
          for (let col = 0; col < Math.ceil(finishW / stripeSize); col++) {
            const isWhite = (row + col) % 2 === 0;
            ctx.fillStyle = isWhite ? 'rgba(255,255,255,0.9)' : 'rgba(20,20,30,0.9)';
            ctx.fillRect(
              finishScreenX - finishW / 2 + col * stripeSize,
              trackTop + row * stripeSize,
              stripeSize,
              stripeSize
            );
          }
        }
        // FINISH 텍스트
        ctx.font = 'bold 11px system-ui';
        ctx.fillStyle = '#fbbf24';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText('FINISH', finishScreenX, trackTop - 4);
      }

      // 스타트라인
      const startScreenX = 0 - cameraX + W * 0.35;
      if (startScreenX > -30 && startScreenX < W + 30) {
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(startScreenX, trackTop);
        ctx.lineTo(startScreenX, trackBottom);
        ctx.stroke();
        ctx.font = 'bold 10px system-ui';
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText('START', startScreenX, trackTop - 4);
      }
    }

    // ===== 매머드 그리기 =====
    function drawMammoth(screenX, baseY, mammoth, scale, animPhase) {
      const s = scale;
      ctx.save();
      ctx.translate(screenX, baseY);

      const bounce = Math.sin(animPhase * 8) * 2 * s;
      const legSwing = Math.sin(animPhase * 8) * 12;

      // 그림자
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.beginPath();
      ctx.ellipse(0, 18 * s, 28 * s, 6 * s, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.translate(0, bounce);

      const bodyColor = mammoth.color;
      const darkColor = shadeColor(bodyColor, -30);
      const lightColor = shadeColor(bodyColor, 30);

      // 다리 (뒤쪽 2개)
      const backLegPhase1 = Math.sin(animPhase * 8) * legSwing;
      const backLegPhase2 = Math.sin(animPhase * 8 + Math.PI) * legSwing;
      drawLeg(ctx, -14 * s, 6 * s, 8 * s, 22 * s, darkColor, backLegPhase1 * 0.3, s);
      drawLeg(ctx, 8 * s, 6 * s, 8 * s, 22 * s, darkColor, backLegPhase2 * 0.3, s);

      // 꼬리
      ctx.strokeStyle = darkColor;
      ctx.lineWidth = 3 * s;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-22 * s, -4 * s);
      const tailWag = Math.sin(animPhase * 6) * 5 * s;
      ctx.quadraticCurveTo(-30 * s, -12 * s + tailWag, -26 * s, -18 * s + tailWag);
      ctx.stroke();

      // 몸통
      const bodyGrad = ctx.createRadialGradient(0, 0, 2 * s, 0, 0, 24 * s);
      bodyGrad.addColorStop(0, lightColor);
      bodyGrad.addColorStop(0.6, bodyColor);
      bodyGrad.addColorStop(1, darkColor);
      ctx.fillStyle = bodyGrad;
      ctx.beginPath();
      ctx.ellipse(0, 0, 24 * s, 14 * s, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = darkColor;
      ctx.lineWidth = 1.5 * s;
      ctx.stroke();

      // 털 질감
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 0.8 * s;
      for (let i = 0; i < 6; i++) {
        const fx = (-15 + i * 6) * s;
        const fy = (-8 + (i % 3) * 4) * s;
        ctx.beginPath();
        ctx.moveTo(fx, fy);
        ctx.lineTo(fx - 3 * s, fy + 5 * s);
        ctx.stroke();
      }

      // 다리 (앞쪽 2개)
      const frontLegPhase1 = Math.sin(animPhase * 8 + Math.PI * 0.5) * legSwing;
      const frontLegPhase2 = Math.sin(animPhase * 8 + Math.PI * 1.5) * legSwing;
      drawLeg(ctx, -10 * s, 8 * s, 9 * s, 22 * s, bodyColor, frontLegPhase1 * 0.3, s);
      drawLeg(ctx, 12 * s, 8 * s, 9 * s, 22 * s, bodyColor, frontLegPhase2 * 0.3, s);

      // 머리
      const headGrad = ctx.createRadialGradient(16 * s, -6 * s, 2 * s, 16 * s, -6 * s, 14 * s);
      headGrad.addColorStop(0, lightColor);
      headGrad.addColorStop(1, bodyColor);
      ctx.fillStyle = headGrad;
      ctx.beginPath();
      ctx.ellipse(16 * s, -6 * s, 12 * s, 10 * s, -0.15, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = darkColor;
      ctx.lineWidth = 1.5 * s;
      ctx.stroke();

      // 귀
      ctx.fillStyle = darkColor;
      ctx.beginPath();
      ctx.ellipse(8 * s, -14 * s, 5 * s, 7 * s, -0.3, 0, Math.PI * 2);
      ctx.fill();

      // 눈
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(21 * s, -9 * s, 3 * s, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath();
      ctx.arc(22 * s, -9 * s, 1.5 * s, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.beginPath();
      ctx.arc(22.5 * s, -10 * s, 0.7 * s, 0, Math.PI * 2);
      ctx.fill();

      // 상아
      ctx.strokeStyle = '#f5f0e0';
      ctx.lineWidth = 2.5 * s;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(24 * s, -2 * s);
      ctx.quadraticCurveTo(32 * s, 6 * s, 28 * s, 12 * s);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(22 * s, 0);
      ctx.quadraticCurveTo(30 * s, 8 * s, 26 * s, 14 * s);
      ctx.stroke();

      // 코
      ctx.strokeStyle = darkColor;
      ctx.lineWidth = 3.5 * s;
      ctx.lineCap = 'round';
      const trunkWave = Math.sin(animPhase * 4) * 3 * s;
      ctx.beginPath();
      ctx.moveTo(26 * s, -2 * s);
      ctx.quadraticCurveTo(30 * s, 4 * s + trunkWave, 26 * s, 10 * s + trunkWave);
      ctx.quadraticCurveTo(24 * s, 14 * s + trunkWave, 22 * s, 12 * s + trunkWave);
      ctx.stroke();

      ctx.restore();
    }

    function drawLeg(ctx, x, y, legWidth, legHeight, color, rotation, scale) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rotation * Math.PI / 180);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.roundRect(-legWidth / 2, 0, legWidth, legHeight, [0, 0, legWidth * 0.4, legWidth * 0.4]);
      ctx.fill();
      // 발
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.beginPath();
      ctx.ellipse(0, legHeight, legWidth * 0.55, legWidth * 0.3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function shadeColor(color, percent) {
      const num = parseInt(color.replace('#', ''), 16);
      const r = Math.min(255, Math.max(0, ((num >> 16) & 0xff) + percent));
      const g = Math.min(255, Math.max(0, ((num >> 8) & 0xff) + percent));
      const b = Math.min(255, Math.max(0, (num & 0xff) + percent));
      return `rgb(${r},${g},${b})`;
    }

    // ===== 매머드들 + 인디케이터 =====
    function drawMammothsAndIndicators(now) {
      const offscreenLeft = [];
      const offscreenRight = [];
      const trackTop = H * 0.44;
      const trackBottom = H * 0.88;
      const laneCount = Math.min(LANE_COUNT, mammoths.length);
      const laneH = (trackBottom - trackTop) / laneCount;

      const sorted = [...mammoths].sort((a, b) => a.laneIndex - b.laneIndex);

      for (const m of sorted) {
        const screenX = m.x - cameraX + W * 0.35;
        const laneY = trackTop + laneH * (m.laneIndex + 0.5);
        const scale = 0.55 + (m.laneIndex / Math.max(1, laneCount - 1)) * 0.35;

        if (screenX < -80 || screenX > W + 80) {
          if (screenX < 0) offscreenLeft.push(m);
          else offscreenRight.push(m);
          continue;
        }

        const animPhase = raceRunning ? (now - raceStartTime) / 1000 + m.index * 0.5 : 0;
        drawMammoth(screenX, laneY, m, scale, m.finished ? 0 : animPhase);

        if (!raceRunning && m.finished) {
          spawnDust(m.x, laneY, 'rgba(200,210,220,0.4)');
        }
        if (raceRunning && !m.finished) {
          spawnDust(m.x, laneY, 'rgba(200,210,220,0.4)');
        }

        // 이름 라벨
        ctx.font = `bold ${11 * scale}px system-ui`;
        const nameText = m.name;
        const textW = ctx.measureText(nameText).width;
        const labelPad = 6;
        const labelX = screenX - (textW + labelPad * 2) / 2;
        const labelY = laneY - 30 * scale;
        const labelH = 16 * scale;

        ctx.fillStyle = 'rgba(10,14,26,0.85)';
        ctx.beginPath();
        ctx.roundRect(labelX, labelY - labelH / 2, textW + labelPad * 2, labelH, 999);
        ctx.fill();
        ctx.strokeStyle = m.color;
        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(nameText, screenX, labelY);
      }

      // 화면 밖 인디케이터
      drawOffscreenIndicators(offscreenLeft, 'left');
      drawOffscreenIndicators(offscreenRight, 'right');
    }

    function drawOffscreenIndicators(list, side) {
      const startY = H * 0.46;
      const gap = 20;
      ctx.font = 'bold 10px system-ui';

      list.forEach((m, i) => {
        const y = startY + i * gap;
        const x = side === 'left' ? 8 : W - 8;

        // 배경 필
        const pillX = side === 'left' ? x + 10 : x - 95;
        ctx.fillStyle = 'rgba(10,14,26,0.88)';
        ctx.beginPath();
        ctx.roundRect(pillX, y - 9, 85, 18, 999);
        ctx.fill();
        ctx.strokeStyle = m.color;
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // 삼각형
        ctx.fillStyle = m.color;
        ctx.beginPath();
        if (side === 'left') {
          ctx.moveTo(x, y);
          ctx.lineTo(x + 8, y - 6);
          ctx.lineTo(x + 8, y + 6);
        } else {
          ctx.moveTo(x, y);
          ctx.lineTo(x - 8, y - 6);
          ctx.lineTo(x - 8, y + 6);
        }
        ctx.closePath();
        ctx.fill();

        // 이름
        ctx.fillStyle = '#fff';
        ctx.textAlign = side === 'left' ? 'left' : 'right';
        ctx.textBaseline = 'middle';
        const textX = side === 'left' ? x + 16 : x - 16;
        ctx.fillText(m.name, textX, y);
      });
    }

    // ===== 미니맵 =====
    function drawMiniMap() {
      const pad = 8;
      const miniW = Math.min(W * 0.3, 200);
      const miniH = 36;
      const x = pad;
      const y = pad;

      ctx.fillStyle = 'rgba(10,14,26,0.88)';
      ctx.strokeStyle = 'rgba(148,163,184,0.4)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(x, y, miniW, miniH, 8);
      ctx.fill();
      ctx.stroke();

      const innerPad = 8;
      const trackX = x + innerPad;
      const trackY = y + miniH / 2;
      const trackInnerW = miniW - innerPad * 2;

      // 트랙 라인
      ctx.strokeStyle = 'rgba(148,163,184,0.5)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(trackX, trackY);
      ctx.lineTo(trackX + trackInnerW, trackY);
      ctx.stroke();

      // 결승선
      ctx.fillStyle = '#fbbf24';
      ctx.fillRect(trackX + trackInnerW - 1, trackY - 5, 2, 10);

      // 매머드 점
      for (const m of mammoths) {
        const p = Math.min(m.x / TRACK_LENGTH, 1);
        const dotX = trackX + trackInnerW * p;
        ctx.fillStyle = m.color;
        ctx.beginPath();
        ctx.arc(dotX, trackY, 3, 0, Math.PI * 2);
        ctx.fill();
      }

      // 카메라 범위
      const camStart = Math.max(0, cameraX / TRACK_LENGTH);
      const camEnd = Math.min(1, (cameraX + W * 0.6) / TRACK_LENGTH);
      const camX1 = trackX + trackInnerW * camStart;
      const camX2 = trackX + trackInnerW * camEnd;
      ctx.fillStyle = 'rgba(248,113,22,0.15)';
      ctx.fillRect(camX1, trackY - 6, camX2 - camX1, 12);
      ctx.strokeStyle = 'rgba(248,113,22,0.5)';
      ctx.lineWidth = 1;
      ctx.strokeRect(camX1, trackY - 6, camX2 - camX1, 12);

      // 라벨
      ctx.font = 'bold 8px system-ui';
      ctx.fillStyle = 'rgba(148,163,184,0.7)';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText('MAP', x + 6, y + 4);
    }

    // ===== 레이스 로직 =====
    function initRace(names) {
      const n = names.length;
      if (!n) return;

      const trackTop = H * 0.44;
      const trackBottom = H * 0.88;
      const laneCount = Math.min(LANE_COUNT, n);
      const laneH = (trackBottom - trackTop) / laneCount;

      mammoths = [];
      finishOrder = [];
      dustParticles = [];

      for (let i = 0; i < n; i++) {
        const laneIndex = i % laneCount;
        const personalFactor = 0.9 + Math.random() * 0.2;

        mammoths.push({
          name: names[i].trim() || `매머드 ${i + 1}`,
          color: colorFromIndex(i),
          laneIndex,
          x: 0,
          baseSpeed: BASE_SPEED * personalFactor,
          velocity: BASE_SPEED * personalFactor,
          finished: false,
          index: i
        });
      }

      initSnow();
      raceStartTime = performance.now();
      raceRunning = true;
      raceFinished = false;
      cameraX = 0;
      lastFrameTime = raceStartTime;
      document.getElementById('statusBadge').textContent = '레이싱 중';
      document.getElementById('statusBadge').style.background = 'rgba(248,113,22,0.2)';
      requestAnimationFrame(loop);
    }

    function updateRace(now) {
      if (!raceRunning) return;

      const elapsed = now - raceStartTime;
      const dt = Math.min(now - lastFrameTime, 50);
      lastFrameTime = now;
      let allFinished = true;

      for (const m of mammoths) {
        if (m.finished) continue;

        const noise = (Math.random() - 0.5) * 0.5;
        m.velocity += noise * (BASE_SPEED * 0.12);

        const meanRevert = (m.baseSpeed - m.velocity) * 0.02;
        m.velocity += meanRevert;

        const minV = BASE_SPEED * 0.55;
        const maxV = BASE_SPEED * 1.6;
        m.velocity = Math.max(minV, Math.min(maxV, m.velocity));

        const remaining = RACE_DURATION - elapsed;
        if (remaining < 5000 && remaining > 0) {
          const progress = m.x / TRACK_LENGTH;
          const catchUpBoost = (1 - progress) * (5000 - remaining) / 5000;
          m.velocity += catchUpBoost * (BASE_SPEED * 0.15);
        }

        m.x += (m.velocity * dt) / 1000;
        if (m.x >= TRACK_LENGTH) {
          m.x = TRACK_LENGTH;
          m.finished = true;
          finishOrder.push(m);
        } else {
          allFinished = false;
        }
      }

      // 카메라
      const ranking = getCurrentRanking();
      const focusEntry = ranking[focusRank - 1] || ranking[0];
      if (focusEntry) {
        const idealCameraX = focusEntry.m.x - W * 0.32;
        const minCam = -W * 0.1;
        const maxCam = TRACK_LENGTH - W * 0.5;
        const clamped = Math.max(minCam, Math.min(maxCam, idealCameraX));
        cameraX += (clamped - cameraX) * 0.08;
      }

      if (elapsed >= RACE_DURATION * 1.8 || allFinished) {
        raceRunning = false;
        raceFinished = true;
        document.getElementById('statusBadge').textContent = '완료!';
        document.getElementById('statusBadge').style.background = 'rgba(34,197,94,0.2)';
      }
    }

    function getCurrentRanking() {
      return mammoths
        .map(m => ({ m, x: m.x }))
        .sort((a, b) => b.x - a.x)
        .map((entry, i) => ({ rank: i + 1, m: entry.m }));
    }

    // ===== 렌더 루프 =====
    function render(now) {
      ctx.clearRect(0, 0, W, H);
      drawBackground();
      drawTrack();
      drawDust();
      drawMammothsAndIndicators(now);
      drawSnow();
      drawMiniMap();

      // 레이스 끝나고 결과 오버레이
      if (raceFinished && finishOrder.length > 0) {
        drawResultOverlay();
      }
    }

    function drawResultOverlay() {
      // 우승자 표시
      const winner = finishOrder[0];
      if (!winner) return;

      ctx.fillStyle = 'rgba(10,14,26,0.6)';
      ctx.fillRect(0, 0, W, H * 0.12);

      ctx.font = `bold ${Math.min(W * 0.035, 22)}px system-ui`;
      ctx.fillStyle = '#fbbf24';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(`🏆 1등: ${winner.name}`, W / 2, H * 0.06);
    }

    function loop(now) {
      if (!mammoths.length) {
        render(performance.now());
        return;
      }
      updateRace(now);
      updateSnow();
      updateDust();
      render(now);
      updateRankList();

      if (raceRunning) {
        requestAnimationFrame(loop);
      } else {
        render(performance.now());
        updateRankList();
      }
    }

    function updateRankList() {
      const ul = document.getElementById('rankList');
      ul.innerHTML = '';
      if (!mammoths.length) return;
      const ranking = getCurrentRanking();
      ranking.forEach(({ rank, m }) => {
        const li = document.createElement('li');
        let cls = 'rank-item';
        if (rank === focusRank) cls += ' focus-rank';
        if (raceFinished && rank === 1) cls += ' finished-first';
        li.className = cls;

        const posSpan = document.createElement('span');
        posSpan.className = 'rank-pos';
        posSpan.textContent = `${rank}`;

        const colorDot = document.createElement('span');
        colorDot.className = 'rank-color';
        colorDot.style.background = m.color;

        const nameSpan = document.createElement('span');
        nameSpan.className = 'rank-name';
        nameSpan.textContent = m.name;

        const distSpan = document.createElement('span');
        distSpan.className = 'rank-dist';
        distSpan.textContent = m.finished ? '🏁' : `${Math.round((m.x / TRACK_LENGTH) * 100)}%`;

        li.appendChild(posSpan);
        li.appendChild(colorDot);
        li.appendChild(nameSpan);
        li.appendChild(distSpan);
        ul.appendChild(li);
      });
    }

    // 초기 화면
    requestAnimationFrame(() => render(performance.now()));

    // ===== UI =====
    const namesInput = document.getElementById('namesInput');
    const focusRankSelect = document.getElementById('focusRankSelect');
    const startBtn = document.getElementById('startBtn');

    focusRankSelect.addEventListener('change', () => {
      focusRank = parseInt(focusRankSelect.value, 10) || 1;
    });

    startBtn.addEventListener('click', () => {
      const raw = namesInput.value.trim();
      let names;
      if (!raw) {
        names = ['토르', '블리자드', '썬더', '아이스', '매그마', '스톰'];
      } else {
        names = raw.split(',').map(s => s.trim()).filter(Boolean);
      }
      if (!names.length) return;
      focusRank = parseInt(focusRankSelect.value, 10) || 1;
      startBtn.disabled = true;
      initRace(names);
      setTimeout(() => { startBtn.disabled = false; }, RACE_DURATION + 2000);
    });
  </script>
</body>
