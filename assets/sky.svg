<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" preserveAspectRatio="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565a8"/>
      <stop offset="18%" stop-color="#2980b9"/>
      <stop offset="38%" stop-color="#4ca3d4"/>
      <stop offset="55%" stop-color="#74bee3"/>
      <stop offset="72%" stop-color="#a0d4ee"/>
      <stop offset="88%" stop-color="#c6e6f6"/>
      <stop offset="100%" stop-color="#dff0fa"/>
    </linearGradient>
    <radialGradient id="sun-glow" cx="82%" cy="12%" r="25%">
      <stop offset="0%" stop-color="#fffbe6" stop-opacity="0.9"/>
      <stop offset="20%" stop-color="#ffe8a0" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#ffd060" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffc040" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sun-body" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="40%" stop-color="#fffde8"/>
      <stop offset="100%" stop-color="#ffe599" stop-opacity="0.6"/>
    </radialGradient>
    <!-- haze near horizon -->
    <linearGradient id="haze" x1="0" y1="0.5" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8dff0" stop-opacity="0"/>
      <stop offset="100%" stop-color="#c8dff0" stop-opacity="0.45"/>
    </linearGradient>
  </defs>
  <!-- sky -->
  <rect width="480" height="200" fill="url(#sky)"/>
  <!-- sun glow -->
  <rect width="480" height="200" fill="url(#sun-glow)"/>
  <!-- sun -->
  <circle cx="394" cy="24" r="10" fill="url(#sun-body)"/>
  <circle cx="394" cy="24" r="5" fill="rgba(255,255,255,0.8)"/>
  <!-- haze -->
  <rect y="100" width="480" height="100" fill="url(#haze)"/>
</svg>
