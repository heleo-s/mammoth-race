<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 60" preserveAspectRatio="none">
  <defs>
    <linearGradient id="grass-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#58a840"/>
      <stop offset="35%" stop-color="#509838"/>
      <stop offset="65%" stop-color="#488e30"/>
      <stop offset="100%" stop-color="#408628"/>
    </linearGradient>
    <!-- grass texture stripe pattern -->
    <pattern id="grass-tex" x="0" y="0" width="8" height="60" patternUnits="userSpaceOnUse">
      <rect width="4" height="60" fill="#3a7a20" opacity="0.06"/>
      <rect x="4" width="4" height="60" fill="#68b848" opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="480" height="60" fill="url(#grass-g)"/>
  <rect width="480" height="60" fill="url(#grass-tex)"/>
  <!-- scattered flowers/detail -->
  <g opacity="0.3">
    <circle cx="30" cy="20" r="1.5" fill="#f0e040"/>
    <circle cx="90" cy="35" r="1.2" fill="#e8e8e8"/>
    <circle cx="150" cy="15" r="1.5" fill="#f0e040"/>
    <circle cx="220" cy="42" r="1.2" fill="#f0a0a0"/>
    <circle cx="280" cy="25" r="1.5" fill="#e8e8e8"/>
    <circle cx="350" cy="38" r="1.2" fill="#f0e040"/>
    <circle cx="410" cy="18" r="1.5" fill="#f0a0a0"/>
    <circle cx="460" cy="48" r="1.2" fill="#e8e8e8"/>
  </g>
</svg>
