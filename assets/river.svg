<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 30" preserveAspectRatio="none">
  <defs>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4aa0c0"/>
      <stop offset="25%" stop-color="#58b0cc"/>
      <stop offset="50%" stop-color="#4ea8c8"/>
      <stop offset="75%" stop-color="#58b0cc"/>
      <stop offset="100%" stop-color="#62b8d2"/>
    </linearGradient>
    <linearGradient id="reflection" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a0d0e8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a0d0e8" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- water body -->
  <rect width="480" height="30" fill="url(#water)"/>
  <!-- sky reflection -->
  <rect width="480" height="10" fill="url(#reflection)"/>
  <!-- wave lines -->
  <g stroke="rgba(255,255,255,0.15)" stroke-width="1" fill="none">
    <path d="M0,8 Q20,6 40,8 Q60,10 80,8 Q100,6 120,8 Q140,10 160,8 Q180,6 200,8 Q220,10 240,8 Q260,6 280,8 Q300,10 320,8 Q340,6 360,8 Q380,10 400,8 Q420,6 440,8 Q460,10 480,8"/>
    <path d="M0,16 Q25,14 50,16 Q75,18 100,16 Q125,14 150,16 Q175,18 200,16 Q225,14 250,16 Q275,18 300,16 Q325,14 350,16 Q375,18 400,16 Q425,14 450,16 Q475,18 480,16"/>
    <path d="M0,23 Q30,21 60,23 Q90,25 120,23 Q150,21 180,23 Q210,25 240,23 Q270,21 300,23 Q330,25 360,23 Q390,21 420,23 Q450,25 480,23"/>
  </g>
  <!-- sparkles -->
  <g fill="rgba(255,255,255,0.4)">
    <rect x="40" y="7" width="6" height="1" rx="0.5"/>
    <rect x="110" y="12" width="5" height="1" rx="0.5"/>
    <rect x="180" y="6" width="7" height="1" rx="0.5"/>
    <rect x="250" y="14" width="5" height="1" rx="0.5"/>
    <rect x="320" y="8" width="6" height="1" rx="0.5"/>
    <rect x="400" y="11" width="5" height="1" rx="0.5"/>
    <rect x="460" y="7" width="6" height="1" rx="0.5"/>
  </g>
  <!-- bank edges -->
  <rect y="0" width="480" height="2" fill="#4a8838" opacity="0.7"/>
  <rect y="28" width="480" height="2" fill="#5a9844" opacity="0.7"/>
</svg>
